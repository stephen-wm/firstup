name: Link Checker

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "lychee.toml"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "lychee.toml"
      - ".github/workflows/link-check.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Mondays at 03:00 UTC

permissions:
  contents: read
  actions: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: link-check-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      # Restore cache before running
      - name: Restore lychee cache
        id: restore-lychee
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-v1
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run Lychee
        uses: lycheeverse/lychee-action@885c65f3dc543b57c898c8099f4e08c8afd178a2 # v2.6.1
        with:
          args: --config lychee.toml .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save lychee cache
        if: always() && steps.restore-lychee.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-v1
